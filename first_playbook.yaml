---
- name: Install and Start Nginx
  hosts: all   # all serves in Inventory
  become: yes # execute as root user 

  tasks:
   
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install Nginx
      apt:
        name: nginx
        state: present
   
    - name: Start Nginx
      service:
        name: nginx
        state: started
        enabled: yes
